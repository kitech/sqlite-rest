name: Build Android ARM32

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Setup Android NDK r25
        run: |
          curl -fsSL \
            https://dl.google.com/android/repository/android-ndk-r25c-linux.zip \
            -o ndk.zip
          unzip -q ndk.zip
          echo "NDK_HOME=${PWD}/android-ndk-r25c" >> $GITHUB_ENV

      - name: Cross-compile for android/arm32
        run: |
          TOOLCHAIN=${NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64
          CC=${TOOLCHAIN}/bin/armv7a-linux-androideabi21-clang
          CGO_ENABLED=1 GOOS=android GOARCH=arm CC=${CC} \
            go build -trimpath -ldflags="-s -w" -o sqlite-rest-arm32 .

      - name: Upload to Nightly Release
        uses: ncipollo/release-action@v1
        with:
          tag: nightly
          name: Nightly Build
          prerelease: true
          allowUpdates: true
          replaceArtifacts: true
          artifacts: sqlite-rest-arm32
          token: ${{ secrets.GITHUB_TOKEN }}
